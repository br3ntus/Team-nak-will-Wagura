<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wagura | Enroll New Pet</title>

    <!-- CSS Links -->
    <link rel="stylesheet" href="../template.css" />
    <link rel="stylesheet" href="../css/add_pet_page.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <!-- SIDEBAR -->
      <aside class="sidebar" style="width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; align-items: center; padding: 20px 0;">
        <a href="../landing_page.html"><img src="../images/Wagura Logo 60x60.png" alt="Wagura" style="width: 40px; border-radius: 8px; margin-bottom: 40px;"></a>
        <ul style="list-style: none; display: flex; flex-direction: column; gap: 30px;">
          <li><a href="dashboard_page.html" style="color: var(--text-muted); font-size: 20px;"><i class="fa-solid fa-house"></i></a></li>
          <li><a href="my_pet_page.html" style="color: var(--clr-accent); font-size: 20px;"><i class="fa-solid fa-user"></i></a></li>
          <li><a href="#" style="color: var(--text-muted); font-size: 20px;"><i class="fa-solid fa-table-cells-large"></i></a></li>
          <li><a href="#" style="color: var(--text-muted); font-size: 20px;"><i class="fa-solid fa-clipboard-list"></i></a></li>
        </ul>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <header class="page-header">
          <div class="title-group">
            <a href="my_pet_page.html" class="back-link">← Back to My Pets</a>
            <h1>Enroll New Pet</h1>
            <p>Fill in your pet's details below</p>
          </div>
          <div style="width: 35px; height: 35px; background: #3d4f5e; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500;">BA</div>
        </header>

        <div class="enroll-grid">
          <!-- LEFT PANEL: PHOTO & ID -->
          <div class="upload-panel">
            <div class="photo-upload-box">
              <i class="fa-solid fa-image"></i>
              <span>Click to upload pet photo</span>
            </div>
            <p class="upload-info">JPG or PNG only. Max 2MB. Square photos work best.</p>
            
            <div class="id-box">
              <label>PET ID</label>
              <span>WG-DOG-0004</span>
              <small>Auto-generated on save</small>
            </div>
          </div>

          <!-- RIGHT PANEL: FORM -->
          <div class="form-panel">
            <span class="section-label">BASIC INFORMATION</span>
            
            <div class="form-group" style="margin-bottom: 2rem;">
              <label>Pet type <span>*</span></label>
              <div class="type-selector">
                <div class="type-option active">
                  <i class="fa-solid fa-dog"></i> Dog
                </div>
                <div class="type-option">
                  <i class="fa-solid fa-cat"></i> Cat
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Pet name <span>*</span></label>
                <input type="text" placeholder="e.g. Coco" />
              </div>
              <div class="form-group">
                <label>Breed <span>*</span></label>
                <input type="text" placeholder="e.g. Aspin, Shih Tzu" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Age <span>*</span></label>
                <input type="text" placeholder="e.g. 2 years" />
              </div>
              <div class="form-group">
                <label>Weight (kg)</label>
                <input type="text" placeholder="e.g. 8.5" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Sex</label>
                <select>
                  <option>Select sex</option>
                  <option>Male</option>
                  <option>Female</option>
                </select>
              </div>
              <div class="form-group">
                <label>Color / Markings</label>
                <input type="text" placeholder="e.g. Brown with white spots" />
              </div>
            </div>

            <span class="section-label" style="margin-top: 2rem;">MEDICAL NOTES</span>
            <div class="form-group">
              <label>Medical history or special notes</label>
              <textarea placeholder="e.g. Vaccinated in March 2025, allergic to chicken..."></textarea>
              <small style="color: var(--text-faint); font-size: 11px; margin-top: 8px;">Optional. You can update this anytime from the health log.</small>
            </div>

            <div class="form-footer">
              <button class="cancel-btn">Cancel</button>
              <button class="save-btn">Save pet</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
